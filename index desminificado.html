<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inventario</title>
    <link rel="shortcut icon" href="Pergamino.png" type="image/png" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
      @font-face {
        font-family: "JetBrainsMono-ExtraLight";
        src: url("JetBrains Mono/JetBrainsMono-ExtraLight.ttf");
      }

      :root {
        --fondo: #0a0a0c;
        --tarjeta-bg: #161618;
        --texto: #ffffff;
        --acento: #00d1ff;
        --borde: #2d2d30;
        --peligro: #ffffff;
        --exito: #30d158;
        --euro: #ffffff;
        --bcv: #ffffff;
        --naranja: #ffffff;
      }

      [data-tema="claro"] {
        --fondo: #ffffff;
        --tarjeta-bg: #f2f2f7;
        --texto: #000000;
        --acento: #0070f3;
        --euro: #000000;
        --bcv: #000000;
        --peligro: #000000;
        --naranja: #000000;
        --borde: #d1d1d6;
      }

      * {
        box-sizing: border-box;
        font-family: "JetBrainsMono-ExtraLight", Arial;
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s;
      }

      body {
        background-color: var(--fondo);
        color: var(--texto);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      .contenedor {
        width: 100%;
        max-width: 1400px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .panel-tasas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
      }

      .tasa-card {
        background: var(--tarjeta-bg);
        border: 1px solid var(--borde);
        padding: 15px;
        border-radius: 12px;
        text-align: center;
      }

      .tasa-label {
        font-size: 0.65rem;
        font-weight: 800;
        color: var(--texto);
        text-transform: uppercase;
        display: block;
        margin-bottom: 5px;
      }

      .tasa-monto {
        font-size: 1.2rem;
        font-weight: 900;
      }

      .grupo-entrada {
        background: var(--tarjeta-bg);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--borde);
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 30px;
        align-items: center;
      }

      .grupo-entrada input,
      .grupo-entrada select {
        flex: 1 1 180px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--borde);
        background: var(--fondo);
        color: var(--texto);
        outline: none;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--borde);
        background: var(--tarjeta-bg);
        color: var(--texto);
        text-transform: uppercase;
        font-size: 0.7rem;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .btn:hover {
        background: var(--texto);
        color: var(--fondo);
      }

      .btn-add {
        background: var(--fondo) !important;
        color: var(--texto) !important;
        border-color: var(--texto) !important;
      }

      .tarjeta-tabla {
        background: var(--tarjeta-bg);
        border-radius: 12px;
        border: 1px solid var(--borde);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 950px;
      }

      th {
        background: var(--borde);
        padding: 15px;
        text-align: left;
        font-size: 13px;
        text-transform: uppercase;
        color: var(--texto);
      }

      td {
        padding: 12px 15px;
        border-bottom: 1px solid var(--borde);
        font-size: 0.95rem;
        color: var(--texto);
      }

      .drag-handle {
        cursor: grab;
        opacity: 0.3;
      }

      .etiqueta {
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        background-color: var(--texto);
        color: var(--fondo);
        border: none;
        letter-spacing: 0.5px;
        cursor: pointer;
        text-align: center;
        appearance: none;
        -webkit-appearance: none;
        min-width: 110px;
      }

      .totales-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .total-card-v2 {
        background: var(--tarjeta-bg);
        border: 1px solid var(--borde);
        border-radius: 12px;
        padding: 20px;
        border-left: 5px solid var(--borde);
      }

      .total-header {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .val-principal {
        font-size: 1.6rem;
        font-weight: 900;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .deslizador {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--borde);
        border-radius: 20px;
      }

      .deslizador:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: var(--texto);
        border-radius: 50%;
        transition: 0.3s;
      }

      input:checked + .deslizador {
        background-color: #8827e2;
      }
      input:checked + .deslizador:before {
        transform: translateX(20px);
        background-color: #000;
      }

      .enlace-contenido {
        text-decoration: none;
        color: var(--texto);
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-left: 20px;
      }

      @media (max-width: 700px) {
        header {
          flex-direction: column;
          gap: 1rem;
          text-align: center;
        }
        .enlace-contenido {
          margin-left: 0;
        }
        .btn-add {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body data-tema="oscuro">
    <section class="contenedor">
      <header>
        <h1 style="margin: 0; letter-spacing: -1.5px; font-weight: 900">
          Inventario
        </h1>
        <a
          class="enlace-contenido"
          href="https://engerberthreyes.github.io/Listado"
          >Ir a Inventario Sin Items →</a
        >
        <label class="switch">
          <input type="checkbox" id="selectorTema" checked />
          <span class="deslizador"></span>
        </label>
      </header>

      <section class="panel-tasas">
        <div class="tasa-card">
          <span class="tasa-label">Dólar BCV</span>
          <span id="t-db" class="tasa-monto" style="color: var(--bcv)"
            >---</span
          >
        </div>
        <div class="tasa-card">
          <span class="tasa-label">Euro BCV</span>
          <span id="t-eb" class="tasa-monto" style="color: var(--euro)"
            >---</span
          >
        </div>
        <div class="tasa-card">
          <span class="tasa-label">Dólar Paralelo</span>
          <span id="t-dp" class="tasa-monto" style="color: var(--peligro)"
            >---</span
          >
        </div>
        <div class="tasa-card">
          <span class="tasa-label">Euro Paralelo</span>
          <span id="t-ep" class="tasa-monto" style="color: var(--naranja)"
            >---</span
          >
        </div>
      </section>

      <section class="grupo-entrada">
        <input type="text" id="in-nombre" placeholder="Concepto / Producto" />
        <input
          type="number"
          id="in-precio"
          placeholder="Precio USD"
          step="0.01"
        />
        <select id="in-prioridad">
          <option value="Alta">Alta</option>
          <option value="Media-Alta">Media-Alta</option>
          <option value="Media" selected>Media</option>
          <option value="Media-Baja">Media-Baja</option>
          <option value="Baja">Baja</option>
        </select>
        <button class="btn btn-add" onclick="agregar()">Añadir Item</button>
      </section>

      <section class="tarjeta-tabla">
        <table>
          <thead>
            <tr>
              <th width="40"></th>
              <th>Producto</th>
              <th>USD ($)</th>
              <th>Bs. (BCV)</th>
              <th>Bs. (Para)</th>
              <th>Prioridad</th>
              <th style="text-align: right">Acción</th>
            </tr>
          </thead>
          <tbody id="lista-inventario"></tbody>
        </table>
      </section>

      <section class="totales-container" id="contenedor-totales"></section>

      <footer id="seccion-papelera" style="display: none; margin-top: 50px">
        <h3 style="font-size: 0.8rem; text-transform: uppercase">
          Papelera de Reciclaje
        </h3>
        <div class="tarjeta-tabla">
          <table>
            <tbody id="lista-papelera"></tbody>
          </table>
        </div>
      </footer>
    </section>

    <script>
      let tasas = { db: 0, eb: 0, dp: 0, ep: 0 };

      // VARIABLES DE LOCALSTORAGE ACTUALIZADAS
      let inventario = JSON.parse(localStorage.getItem("sistema_inv_prod")) || [
        {
          nombre: "Cable Cat 6 o 6A [RJ45]",
          precio: "20",
          prioridad: "Media-Alta",
        },
        { nombre: "Mesa", precio: "150", prioridad: "Alta" },
        { nombre: "Teclado y Mouse", precio: "90", prioridad: "Media" },
        { nombre: "Saco Cruzado Negro", precio: "120", prioridad: "Media" },
        { nombre: "Hoodie [Negro]", precio: "25", prioridad: "Baja" },
        { nombre: "Vans Negras [No Botines]", precio: "30", prioridad: "Baja" },
      ];

      let papelera = JSON.parse(localStorage.getItem("sistema_pap_prod")) || [];

      const lista = document.getElementById("lista-inventario");

      Sortable.create(lista, {
        animation: 150,
        handle: ".drag-handle",
        onEnd: () => {
          const nuevasFilas = Array.from(lista.querySelectorAll("tr"));
          inventario = nuevasFilas.map((tr) => JSON.parse(tr.dataset.info));
          guardar(false);
        },
      });

      async function fetchTasas() {
        try {
          const [rd, re] = await Promise.all([
            fetch("https://ve.dolarapi.com/v1/dolares"),
            fetch("https://ve.dolarapi.com/v1/euros"),
          ]);
          const dd = await rd.json(),
            de = await re.json();
          tasas.db = dd.find((x) => x.fuente === "oficial").promedio;
          tasas.dp = dd.find((x) => x.fuente === "paralelo").promedio;
          tasas.eb = de.find((x) => x.fuente === "oficial").promedio;
          tasas.ep = de.find((x) => x.fuente === "paralelo").promedio;
          render();
        } catch (e) {
          console.error("Error APIs");
        }
      }

      const f = (n) =>
        n.toLocaleString("es-VE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });

      function render() {
        document.getElementById("t-db").innerText =
          `Bs. ${tasas.db.toFixed(2)}`;
        document.getElementById("t-eb").innerText =
          `Bs. ${tasas.eb.toFixed(2)}`;
        document.getElementById("t-dp").innerText =
          `Bs. ${tasas.dp.toFixed(2)}`;
        document.getElementById("t-ep").innerText =
          `Bs. ${tasas.ep.toFixed(2)}`;

        lista.innerHTML = "";
        let sumaUSD = 0;

        inventario.forEach((item, i) => {
          const p = parseFloat(item.precio) || 0;
          sumaUSD += p;
          const tr = document.createElement("tr");
          tr.dataset.info = JSON.stringify(item);
          tr.innerHTML = `
            <td><span class="drag-handle">⠿</span></td>
            <td contenteditable="true" onblur="edit(${i},'nombre',this.innerText)">${item.nombre}</td>
            <td style="font-weight:900">$<span contenteditable="true" onblur="edit(${i},'precio',this.innerText)">${item.precio}</span></td>
            <td>${f(p * tasas.db)}</td>
            <td>${f(p * tasas.dp)}</td>
            <td>
              <select class="etiqueta" onchange="edit(${i},'prioridad',this.value)">
                <option value="Alta" ${item.prioridad === "Alta" ? "selected" : ""}>Alta</option>
                <option value="Media-Alta" ${item.prioridad === "Media-Alta" ? "selected" : ""}>Media-Alta</option>
                <option value="Media" ${item.prioridad === "Media" ? "selected" : ""}>Media</option>
                <option value="Media-Baja" ${item.prioridad === "Media-Baja" ? "selected" : ""}>Media-Baja</option>
                <option value="Baja" ${item.prioridad === "Baja" ? "selected" : ""}>Baja</option>
              </select>
            </td>
            <td style="text-align:right"><button class="btn" style="padding:4px 8px" onclick="borrar(${i})">✕</button></td>
          `;
          lista.appendChild(tr);
        });

        actualizarTotales(sumaUSD);
        renderPapelera();
      }

      function actualizarTotales(sumaUSD) {
        const bsOfi = sumaUSD * tasas.db;
        const bsPar = sumaUSD * tasas.dp;
        document.getElementById("contenedor-totales").innerHTML = `
          <div class="total-card-v2"><div class="total-header">Total Dólar BCV</div><div class="total-row"><span class="val-principal">$${f(sumaUSD)}</span><span style="color:var(--bcv)">Bs. ${f(bsOfi)}</span></div></div>
          <div class="total-card-v2"><div class="total-header">Total Dólar Paralelo</div><div class="total-row"><span class="val-principal">$${f(sumaUSD)}</span><span style="color:var(--peligro)">Bs. ${f(bsPar)}</span></div></div>
          <div class="total-card-v2"><div class="total-header">Total Euro BCV</div><div class="total-row"><span class="val-principal">€${f(bsOfi / tasas.eb)}</span><span style="color:var(--euro)">Bs. ${f(bsOfi)}</span></div></div>
          <div class="total-card-v2"><div class="total-header">Total Euro Paralelo</div><div class="total-row"><span class="val-principal">€${f(bsPar / tasas.ep)}</span><span style="color:var(--naranja)">Bs. ${f(bsPar)}</span></div></div>
        `;
      }

      function renderPapelera() {
        const pCuerpo = document.getElementById("lista-papelera");
        pCuerpo.innerHTML = "";
        document.getElementById("seccion-papelera").style.display =
          papelera.length ? "block" : "none";
        papelera.forEach((p, i) => {
          pCuerpo.innerHTML += `<tr><td><s>${p.item.nombre}</s></td><td style="text-align:right">
            <button class="btn" onclick="restaurar(${i},'orig')">Original</button>
            <button class="btn" onclick="restaurar(${i},'fin')">Final</button>
          </td></tr>`;
        });
      }

      function guardar(refresh = true) {
        localStorage.setItem("sistema_inv_prod", JSON.stringify(inventario));
        localStorage.setItem("sistema_pap_prod", JSON.stringify(papelera));
        if (refresh) render();
      }

      window.agregar = () => {
        const n = document.getElementById("in-nombre"),
          p = document.getElementById("in-precio"),
          pr = document.getElementById("in-prioridad");
        if (n.value) {
          inventario.push({
            nombre: n.value,
            precio: p.value || 0,
            prioridad: pr.value,
          });
          n.value = "";
          p.value = "";
          guardar();
        }
      };

      window.edit = (i, c, v) => {
        inventario[i][c] = v.trim();
        guardar(c !== "nombre");
      };

      window.borrar = (i) => {
        papelera.push({ item: inventario[i], pos: i });
        inventario.splice(i, 1);
        guardar();
      };

      window.restaurar = (i, m) => {
        const p = papelera[i];
        if (m === "orig")
          inventario.splice(Math.min(p.pos, inventario.length), 0, p.item);
        else inventario.push(p.item);
        papelera.splice(i, 1);
        guardar();
      };

      document.getElementById("selectorTema").onchange = (e) =>
        document.body.setAttribute(
          "data-tema",
          e.target.checked ? "oscuro" : "claro",
        );

      fetchTasas();
    </script>
  </body>
</html>
