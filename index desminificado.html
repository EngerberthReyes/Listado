<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inventario</title>
    <link rel="shortcut icon" href="Pergamino.png" type="image/png" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
      @font-face {
        font-family: "JetBrainsMono-ExtraLight";
        src: url("JetBrains Mono/JetBrainsMono-ExtraLight.ttf");
      }

      :root {
        --fondo: #0a0a0c;
        --tarjeta-bg: #161618;
        --texto: #ffffff;
        --acento: #00d1ff;
        --borde: #2d2d30;
        --peligro: #ffffff; /* Texto Blanco en modo oscuro */
        --exito: #30d158;
        --euro: #ffffff;
        --bcv: #ffffff;
        --naranja: #ffffff;
        --rojo-prioridad: #ff453a;
        --naranja-prioridad: #ff9f0a;
      }

      [data-tema="claro"] {
        --fondo: #ffffff;
        --tarjeta-bg: #f2f2f7;
        --texto: #000000;
        --acento: #0070f3;
        --euro: #000000;
        --bcv: #000000;
        --peligro: #000000; /* Texto Negro en modo claro */
        --naranja: #000000;
        --borde: #d1d1d6;
      }

      * {
        box-sizing: border-box;
        font-family: "JetBrainsMono-ExtraLight", Arial;
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s;
      }
      body {
        background-color: var(--fondo);
        color: var(--texto);
        font-family: "JetBrainsMono-ExtraLight", Arial;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }
      .contenedor {
        width: 100%;
        max-width: 1400px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .panel-tasas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
      }
      .tasa-card {
        background: var(--tarjeta-bg);
        border: 1px solid var(--borde);
        padding: 15px;
        border-radius: 12px;
        text-align: center;
      }
      .tasa-label {
        font-size: 0.65rem;
        font-weight: 800;
        color: var(--texto);
        text-transform: uppercase;
        display: block;
        margin-bottom: 5px;
      }
      .tasa-monto {
        font-size: 1.2rem;
        font-weight: 900;
      }

      #in-precio::-webkit-outer-spin-button,
      #in-precio::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      #in-precio {
        appearance: textfield;
        -moz-appearance: textfield;
      }

      .grupo-entrada {
        background: var(--tarjeta-bg);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--borde);
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 30px;
        align-items: center;
      }
      .grupo-entrada input,
      .grupo-entrada select {
        flex: 1 1 180px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--borde);
        background: var(--fondo);
        color: var(--texto);
        outline: none;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--borde);
        background: var(--tarjeta-bg);
        color: var(--texto);
        text-transform: uppercase;
        font-size: 0.7rem;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .btn:hover {
        background: var(--texto);
        color: var(--fondo);
      }
      .btn-add {
        background: var(--fondo) !important;
        color: var(--texto) !important;
        border-color: var(--texto) !important;
      }

      .tarjeta-tabla {
        background: var(--tarjeta-bg);
        border-radius: 12px;
        border: 1px solid var(--borde);
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 900px;
      }
      th {
        background: var(--borde);
        padding: 15px;
        text-align: left;
        font-size: 15px;
        text-transform: uppercase;
        color: var(--texto);
      }
      td {
        padding: 15px;
        border-bottom: 1px solid var(--borde);
        font-size: 0.95rem;
        color: var(--texto);
      }
      .drag-handle {
        cursor: grab;
        opacity: 0.3;
        padding-right: 10px;
      }

      .etiqueta {
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        display: inline-block;
        background-color: var(--texto);
        color: var(--fondo);
        border: none;
        letter-spacing: 0.5px;
      }
      /*  .Alta {
      }

      .Media {
      }

      .Baja {
      }
*/
      .totales-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }
      .total-card-v2 {
        background: var(--tarjeta-bg);
        border: 1px solid var(--borde);
        border-radius: 12px;
        padding: 20px;
        border-left: 5px solid var(--borde);
      }
      .total-header {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--texto);
        margin-bottom: 10px;
      }
      .total-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .val-principal {
        font-size: 1.6rem;
        font-weight: 900;
      }
      .val-bolivares {
        font-size: 0.95rem;
        font-weight: 700;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .deslizador {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--borde);
        border-radius: 20px;
      }
      .deslizador:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: var(--texto);
        border-radius: 50%;
        transition: 0.3s;
      }
      input:checked + .deslizador {
        background-color: #8827e2;
      }
      input:checked + .deslizador:before {
        transform: translateX(20px);
        background-color: #000;
      }
    </style>
  </head>
  <body data-tema="oscuro">
    <section class="contenedor">
      <header>
        <h1 style="margin: 0; letter-spacing: -1.5px; font-weight: 900">
          Inventario
        </h1>
        <a
          href="https://engerberthreyes.github.io/Listado"
          style="
            text-decoration: none;
            color: var(--texto);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding-bottom: 2px;
            margin-left: 20px;
          "
        >
          Ir a Inventario Con Items →
        </a>
        <label class="switch"
          ><input type="checkbox" id="selectorTema" checked /><span
            class="deslizador"
          ></span
        ></label>
      </header>

      <section class="panel-tasas">
        <section class="tasa-card">
          <span class="tasa-label">Dólar BCV</span
          ><span id="t-db" class="tasa-monto" style="color: var(--bcv)"
            >---</span
          >
        </section>
        <section class="tasa-card">
          <span class="tasa-label">Euro BCV</span
          ><span id="t-eb" class="tasa-monto" style="color: var(--euro)"
            >---</span
          >
        </section>
        <section class="tasa-card">
          <span class="tasa-label">Dólar Paralelo</span
          ><span id="t-dp" class="tasa-monto" style="color: var(--peligro)"
            >---</span
          >
        </section>
        <section class="tasa-card">
          <span class="tasa-label">Euro Paralelo</span
          ><span id="t-ep" class="tasa-monto" style="color: var(--naranja)"
            >---</span
          >
        </section>
      </section>

      <section class="grupo-entrada">
        <input type="text" id="in-nombre" placeholder="Concepto / Producto" />
        <input
          type="number"
          id="in-precio"
          placeholder="Precio USD"
          step="0.01"
        />
        <select id="in-prioridad">
          <option value="Alta">Alta</option>
          <option value="Media" selected>Media</option>
          <option value="Baja">Baja</option>
        </select>
        <button class="btn btn-add" onclick="agregar()">Añadir Item</button>
      </section>

      <section class="tarjeta-tabla">
        <table>
          <thead>
            <tr>
              <th width="40"></th>
              <th>Producto</th>
              <th>USD ($)</th>
              <th>Bs. (BCV)</th>
              <th>Bs. (Para)</th>
              <th>Prioridad</th>
              <th style="text-align: right">Acción</th>
            </tr>
          </thead>
          <tbody id="lista-inventario"></tbody>
        </table>
      </section>

      <section class="totales-container" id="contenedor-totales"></section>

      <footer id="seccion-papelera" style="display: none; margin-top: 50px">
        <h3 style="font-size: 0.8rem; text-transform: uppercase">
          Papelera de Reciclaje
        </h3>
        <section class="tarjeta-tabla">
          <table>
            <tbody id="lista-papelera"></tbody>
          </table>
        </section>
      </footer>
    </section>

    <script>
      let tasas = { db: 0, eb: 0, dp: 0, ep: 0 };
      const datosIniciales = [
        {
          nombre: "Cable Cat 6 o 6A [RJ45]",
          precio: "10",
          importancia: "Media",
        },
        { nombre: "Mesa", precio: "150", importancia: "Alta" },
        { nombre: "Teclado y Mouse", precio: "60", importancia: "Media" },
        { nombre: "Saco Cruzado Negro", precio: "200", importancia: "Media" },
        { nombre: "Hoodie", precio: "45", importancia: "Baja" },
        {
          nombre: "Vans Negras [No Botines]",
          precio: "80",
          importancia: "Baja",
        },
      ];

      let inventario = JSON.parse(localStorage.getItem("inv_v5"));
      if (!inventario || inventario.length === 0) {
        inventario = datosIniciales;
      }

      let papelera = JSON.parse(localStorage.getItem("pap_v5")) || [];

      const lista = document.getElementById("lista-inventario");
      Sortable.create(lista, {
        animation: 150,
        handle: ".drag-handle",
        ghostClass: "sortable-ghost",
        onEnd: () => {
          inventario = Array.from(lista.querySelectorAll("tr")).map((r) =>
            JSON.parse(r.dataset.info),
          );
          guardar();
        },
      });

      async function fetchTasas() {
        try {
          const [rd, re] = await Promise.all([
            fetch("https://ve.dolarapi.com/v1/dolares"),
            fetch("https://ve.dolarapi.com/v1/euros"),
          ]);
          const dd = await rd.json(),
            de = await re.json();
          tasas.db = dd.find((x) => x.fuente === "oficial").promedio;
          tasas.dp = dd.find((x) => x.fuente === "paralelo").promedio;
          tasas.eb = de.find((x) => x.fuente === "oficial").promedio;
          tasas.ep = de.find((x) => x.fuente === "paralelo").promedio;
          render();
        } catch (e) {
          console.error("Error APIs");
        }
      }

      const f = (n) =>
        n.toLocaleString("es-VE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });

      function render() {
        document.getElementById("t-db").innerText =
          `Bs. ${tasas.db.toFixed(2)}`;
        document.getElementById("t-eb").innerText =
          `Bs. ${tasas.eb.toFixed(2)}`;
        document.getElementById("t-dp").innerText =
          `Bs. ${tasas.dp.toFixed(2)}`;
        document.getElementById("t-ep").innerText =
          `Bs. ${tasas.ep.toFixed(2)}`;

        lista.innerHTML = "";
        let sumaUSD = 0;

        inventario.forEach((item, i) => {
          const p = parseFloat(item.precio) || 0;
          sumaUSD += p;
          const tr = document.createElement("tr");
          tr.dataset.info = JSON.stringify(item);
          tr.innerHTML = `
            <td><span class="drag-handle">⠿</span></td>
            <td contenteditable="true" onblur="edit(${i},'nombre',this.innerText)">${item.nombre}</td>
            <td style="font-weight:900">$<span contenteditable="true" onblur="edit(${i},'precio',this.innerText)">${item.precio}</span></td>
            <td>${f(p * tasas.db)}</td>
            <td>${f(p * tasas.dp)}</td>
            <td><span class="etiqueta ${item.prioridad}">${item.prioridad}</span></td>
            <td style="text-align:right"><button class="btn" style="padding:4px 8px" onclick="borrar(${i})">✕</button></td>
          `;
          lista.appendChild(tr);
        });

        const bsOfi = sumaUSD * tasas.db;
        const bsPar = sumaUSD * tasas.dp;
        document.getElementById("contenedor-totales").innerHTML = `
          <section class="total-card-v2" style="border-left-color: var(--texto)">
            <section class="total-header">Total Dólar BCV</section>
            <section class="total-row"><span class="val-principal">$${f(sumaUSD)}</span><span class="val-bolivares" style="color:var(--bcv)">Bs. ${f(bsOfi)}</span></section>
          </section>
          <section class="total-card-v2" style="border-left-color: var(--texto)">
            <section class="total-header">Total Dólar Paralelo</section>
            <section class="total-row"><span class="val-principal">$${f(sumaUSD)}</span><span class="val-bolivares" style="color:var(--peligro)">Bs. ${f(bsPar)}</span></section>
          </section>
          <section class="total-card-v2" style="border-left-color: var(--texto)">
            <section class="total-header">Total Euro BCV</section>
            <section class="total-row"><span class="val-principal">€${f(bsOfi / tasas.eb)}</span><span class="val-bolivares" style="color:var(--euro)">Bs. ${f(bsOfi)}</span></section>
          </section>
          <section class="total-card-v2" style="border-left-color: var(--texto)">
            <section class="total-header">Total Euro Paralelo</section>
            <section class="total-row"><span class="val-principal">€${f(bsPar / tasas.ep)}</span><span class="val-bolivares" style="color:var(--naranja)">Bs. ${f(bsPar)}</span></section>
          </section>
        `;

        const pCuerpo = document.getElementById("lista-papelera");
        pCuerpo.innerHTML = "";
        document.getElementById("seccion-papelera").style.display =
          papelera.length ? "block" : "none";
        papelera.forEach((p, i) => {
          pCuerpo.innerHTML += `<tr>
            <td><s>${p.item.nombre}</s></td>
            <td style="text-align:right; display:flex; gap:10px; justify-content:flex-end">
              <button class="btn" style="font-size:11px" onclick="restaurar(${i},'orig')">Original</button>
              <button class="btn" style="font-size:11px" onclick="restaurar(${i},'fin')">Al Final</button>
            </td>
          </tr>`;
        });
      }

      function guardar() {
        localStorage.setItem("inv_v5", JSON.stringify(inventario));
        localStorage.setItem("pap_v5", JSON.stringify(papelera));
        render();
      }

      window.agregar = () => {
        const n = document.getElementById("in-nombre"),
          p = document.getElementById("in-precio"),
          pr = document.getElementById("in-prioridad");
        if (n.value) {
          inventario.push({
            nombre: n.value,
            precio: p.value || 0,
            prioridad: pr.value,
          });
          n.value = "";
          p.value = "";
          guardar();
        }
      };
      window.edit = (i, c, v) => {
        inventario[i][c] = v;
        guardar();
      };
      window.borrar = (i) => {
        papelera.push({ item: inventario[i], pos: i });
        inventario.splice(i, 1);
        guardar();
      };
      window.restaurar = (i, m) => {
        const p = papelera[i];
        if (m === "orig")
          inventario.splice(Math.min(p.pos, inventario.length), 0, p.item);
        else inventario.push(p.item);
        papelera.splice(i, 1);
        guardar();
      };
      document.getElementById("selectorTema").onchange = (e) =>
        document.body.setAttribute(
          "data-tema",
          e.target.checked ? "oscuro" : "claro",
        );

      fetchTasas();
    </script>
  </body>
</html>
