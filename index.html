ze:.7rem;font-weight:800;text-transform:uppercase;margin-left:20px}@media (max-width:700px){header{flex-direction:column;gap:1rem;text-align:center}.enlace-contenido{margin-left:0}.btn-add{width:100%;justify-content:center}}</style></head><body data-tema="oscuro"><section class="contenedor"><header><h1>Inventario</h1><a class="enlace-contenido" href="https://engerberthreyes.github.io/Listado/index desminificado.html">Ir a Inventario Con Items →</a> <label class="switch"><input type="checkbox" id="selectorTema" checked="checked"> <span class="deslizador"></span></label></header><section class="panel-tasas"><section class="tasa-card"><span class="tasa-label">Dólar BCV</span> <span id="t-db" class="tasa-monto">---</span><section id="f-db" class="tasa-label moneda-fecha"></section></section><section class="tasa-card"><span class="tasa-label">Euro BCV</span> <span id="t-eb" class="tasa-monto moneda-fecha">---</span><section id="f-eb" class="tasa-label moneda-fecha"></section></section><section class="tasa-card"><span class="tasa-label">Dólar Paralelo</span> <span id="t-dp" class="tasa-monto">---</span><section id="f-dp" class="tasa-label moneda-fecha"></section></section><section class="tasa-card"><span class="tasa-label">Euro Paralelo</span> <span id="t-ep" class="tasa-monto moneda-fecha">---</span><section id="f-ep" class="tasa-label moneda-fecha"></section></section></section><section class="grupo-entrada"><input id="in-nombre" placeholder="Concepto / Producto"> <input type="number" id="in-precio" placeholder="Precio USD" step="0.01"> <select id="in-prioridad"><option value="Muy Alta" selected>Muy Alta</option><option value="Alta">Alta</option><option value="Media-Alta">Media-Alta</option><option value="Media">Media</option><option value="Media-Baja">Media-Baja</option><option value="Baja">Baja</option></select> <button class="btn btn-add" onclick="agregar()">Añadir Item</button></section><section class="tarjeta-tabla"><table><thead><tr><th width="40"></th><th>Product
