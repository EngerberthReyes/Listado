<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inventario</title><link rel="shortcut icon" href="Pergamino.png" type="image/png"><script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script><style>@font-face{font-family:"JetBrainsMono-ExtraLight";src:url(JetBrains\ Mono/JetBrainsMono-ExtraLight.ttf)}:root{--fondo:#0a0a0c;--tarjeta-bg:#161618;--texto:#ffffff;--acento:#00d1ff;--borde:#2d2d30;--peligro:#ffffff;--exito:#30d158;--euro:#ffffff;--bcv:#ffffff;--naranja:#ffffff}[data-tema=claro]{--fondo:#ffffff;--tarjeta-bg:#f2f2f7;--texto:#000000;--acento:#0070f3;--euro:#000000;--bcv:#000000;--peligro:#000000;--naranja:#000000;--borde:#d1d1d6}*{box-sizing:border-box;font-family:"JetBrainsMono-ExtraLight",Arial;transition:background-color .3s,color .3s,border-color .3s}body{background-color:var(--fondo);margin:0;padding:20px;display:flex;justify-content:center}.contenedor{width:100%;max-width:1400px}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}.panel-tasas{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px}.tasa-card{background:var(--tarjeta-bg);border:1px solid var(--borde);padding:15px;border-radius:12px;text-align:center}.tasa-label{font-size:.65rem;font-weight:800;color:var(--texto);text-transform:uppercase;display:block;margin-bottom:5px}.tasa-monto{font-size:1.2rem;font-weight:900}.grupo-entrada{background:var(--tarjeta-bg);padding:20px;border-radius:16px;border:1px solid var(--borde);display:flex;flex-wrap:wrap;gap:15px;margin-bottom:30px;align-items:center}.btn,.grupo-entrada input,.grupo-entrada select{border-radius:8px;border:1px solid var(--borde);color:var(--texto)}.grupo-entrada input,.grupo-entrada select{flex:1 1 180px;padding:12px;background:var(--fondo);outline:0}.btn{padding:10px 18px;font-weight:700;cursor:pointer;background:var(--tarjeta-bg);text-transform:uppercase;font-size:.7rem;display:inline-flex;align-items:center;gap:5px}.btn:hover{background:var(--texto);color:var(--fondo)}.btn-add{background:var(--fondo)!important;color:var(--texto)!important;border-color:var(--texto)!important}.tarjeta-tabla{background:var(--tarjeta-bg);border-radius:12px;border:1px solid var(--borde);overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:950px}body,td,th{color:var(--texto)}th{background:var(--borde);padding:15px;text-align:left;font-size:13px}td{padding:12px 15px;border-bottom:1px solid var(--borde);font-size:.95rem}.drag-handle{cursor:grab;opacity:.3}.etiqueta,th{text-transform:uppercase}.etiqueta{padding:5px 10px;border-radius:6px;font-size:.65rem;font-weight:900;background-color:var(--texto);color:var(--fondo);border:0;letter-spacing:.5px;cursor:pointer;text-align:center;appearance:none;-webkit-appearance:none;min-width:110px}.totales-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:30px}.total-card-v2{background:var(--tarjeta-bg);border:1px solid var(--borde);border-radius:12px;padding:20px;border-left:5px solid var(--borde)}.total-header{font-size:.7rem;font-weight:800;text-transform:uppercase;margin-bottom:10px}.val-principal{font-size:1.6rem;font-weight:900}.switch{position:relative;display:inline-block;width:40px;height:20px}.switch input{opacity:0;width:0;height:0}.deslizador{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--borde);border-radius:20px}.deslizador:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background-color:var(--texto);border-radius:50%;transition:.3s}input:checked+.deslizador{background-color:#8827e2}input:checked+.deslizador:before{transform:translateX(20px);background-color:#000}.enlace-contenido{text-decoration:none;color:var(--texto);font-size:.7rem;font-weight:800;text-transform:uppercase;margin-left:20px}@media (max-width:700px){header{flex-direction:column;gap:1rem;text-align:center}.enlace-contenido{margin-left:0}.btn-add{width:100%;justify-content:center}}</style></head><body data-tema="oscuro"><section class="contenedor"><header><h1>Inventario</h1><a class="enlace-contenido" href="https://engerberthreyes.github.io/Listado/index desminificado.html">Ir a Inventario Con Items →</a> <label class="switch"><input type="checkbox" id="selectorTema" checked="checked"> <span class="deslizador"></span></label></header><section class="panel-tasas"><section class="tasa-card"><span class="tasa-label">Dólar BCV</span><span id="t-db" class="tasa-monto">---</span></section><section class="tasa-card"><span class="tasa-label">Euro BCV</span><span id="t-eb" class="tasa-monto">---</span></section><section class="tasa-card"><span class="tasa-label">Dólar Paralelo</span><span id="t-dp" class="tasa-monto">---</span></section><section class="tasa-card"><span class="tasa-label">Euro Paralelo</span><span id="t-ep" class="tasa-monto">---</span></section></section><section class="grupo-entrada"><input id="in-nombre" placeholder="Concepto / Producto"> <input type="number" id="in-precio" placeholder="Precio USD" step="0.01"> <select id="in-prioridad"><option value="Alta">Alta</option><option value="Media-Alta">Media-Alta</option><option value="Media" selected="selected">Media</option><option value="Media-Baja">Media-Baja</option><option value="Baja">Baja</option></select> <button class="btn btn-add" onclick="agregar()">Añadir Item</button></section><section class="tarjeta-tabla"><table><thead><tr><th width="40"></th><th>Producto</th><th>USD ($)</th><th>Bs. (BCV)</th><th>Bs. (Para)</th><th>Prioridad</th><th>Acción</th></tr></thead><tbody id="lista-inventario"></tbody></table></section><section class="totales-container" id="contenedor-totales"></section><footer id="seccion-papelera"><h3>Papelera de Reciclaje</h3><section class="tarjeta-tabla"><table><tbody id="lista-papelera"></tbody></table></section></footer></section><script>let tasas={db:0,eb:0,dp:0,ep:0},inventario=JSON.parse(localStorage.getItem("inv_v5"))||[],papelera=JSON.parse(localStorage.getItem("pap_v5"))||[];const lista=document.getElementById("lista-inventario");async function fetchTasas(){try{const[a,e]=await Promise.all([fetch("https://ve.dolarapi.com/v1/dolares"),fetch("https://ve.dolarapi.com/v1/euros")]),t=await a.json(),n=await e.json();tasas.db=t.find(a=>"oficial"===a.fuente).promedio,tasas.dp=t.find(a=>"paralelo"===a.fuente).promedio,tasas.eb=n.find(a=>"oficial"===a.fuente).promedio,tasas.ep=n.find(a=>"paralelo"===a.fuente).promedio,render()}catch(a){console.error("Error APIs")}}Sortable.create(lista,{animation:150,handle:".drag-handle",onEnd:()=>{const a=Array.from(lista.querySelectorAll("tr"));inventario=a.map(a=>JSON.parse(a.dataset.info)),guardar(!1)}});const f=a=>a.toLocaleString("es-VE",{minimumFractionDigits:2,maximumFractionDigits:2});function render(){document.getElementById("t-db").innerText=`Bs. ${tasas.db.toFixed(2)}`,document.getElementById("t-eb").innerText=`Bs. ${tasas.eb.toFixed(2)}`,document.getElementById("t-dp").innerText=`Bs. ${tasas.dp.toFixed(2)}`,document.getElementById("t-ep").innerText=`Bs. ${tasas.ep.toFixed(2)}`,lista.innerHTML="";let a=0;inventario.forEach((e,t)=>{const n=parseFloat(e.precio)||0;a+=n;const i=document.createElement("tr");i.dataset.info=JSON.stringify(e),i.innerHTML=`\n            <td><span class="drag-handle">⠿</span></td>\n            <td contenteditable="true" onblur="edit(${t},'nombre',this.innerText)">${e.nombre}</td>\n            <td style="font-weight:900">$<span contenteditable="true" onblur="edit(${t},'precio',this.innerText)">${e.precio}</span></td>\n            <td>${f(n*tasas.db)}</td>\n            <td>${f(n*tasas.dp)}</td>\n            <td>\n              <select class="etiqueta" onchange="edit(${t},'prioridad',this.value)">\n                <option value="Alta" ${"Alta"===e.prioridad?"selected":""}>Alta</option>\n                <option value="Media-Alta" ${"Media-Alta"===e.prioridad?"selected":""}>Media-Alta</option>\n                <option value="Media" ${"Media"===e.prioridad?"selected":""}>Media</option>\n                <option value="Media-Baja" ${"Media-Baja"===e.prioridad?"selected":""}>Media-Baja</option>\n                <option value="Baja" ${"Baja"===e.prioridad?"selected":""}>Baja</option>\n              </select>\n            </td>\n            <td style="text-align:right"><button class="btn" style="padding:4px 8px" onclick="borrar(${t})">✕</button></td>\n          `,lista.appendChild(i)}),actualizarTotales(a),renderPapelera()}function actualizarTotales(a){const e=a*tasas.db,t=a*tasas.dp;document.getElementById("contenedor-totales").innerHTML=`\n          <section class="total-card-v2"><section class="total-header">Total Dólar BCV</section><section class="total-row"><span class="val-principal">$${f(a)}</span><span style="color:var(--bcv)">Bs. ${f(e)}</span></section></section>\n          <section class="total-card-v2"><section class="total-header">Total Dólar Paralelo</section><section class="total-row"><span class="val-principal">$${f(a)}</span><span style="color:var(--peligro)">Bs. ${f(t)}</span></section></section>\n          <section class="total-card-v2"><section class="total-header">Total Euro BCV</section><section class="total-row"><span class="val-principal">€${f(e/tasas.eb)}</span><span style="color:var(--euro)">Bs. ${f(e)}</span></section></section>\n          <section class="total-card-v2"><section class="total-header">Total Euro Paralelo</section><section class="total-row"><span class="val-principal">€${f(t/tasas.ep)}</span><span style="color:var(--naranja)">Bs. ${f(t)}</span></section></section>\n        `}function renderPapelera(){const a=document.getElementById("lista-papelera");a.innerHTML="",document.getElementById("seccion-papelera").style.display=papelera.length?"block":"none",papelera.forEach((e,t)=>{a.innerHTML+=`<tr><td><s>${e.item.nombre}</s></td><td style="text-align:right">\n            <button class="btn" onclick="restaurar(${t},'orig')">Original</button>\n            <button class="btn" onclick="restaurar(${t},'fin')">Final</button>\n          </td></tr>`})}function guardar(a=!0){localStorage.setItem("inv_v5",JSON.stringify(inventario)),localStorage.setItem("pap_v5",JSON.stringify(papelera)),a&&render()}window.agregar=()=>{const a=document.getElementById("in-nombre"),e=document.getElementById("in-precio"),t=document.getElementById("in-prioridad");a.value&&(inventario.push({nombre:a.value,precio:e.value||0,prioridad:t.value}),a.value="",e.value="",guardar())},window.edit=(a,e,t)=>{inventario[a][e]=t.trim(),guardar("nombre"!==e)},window.borrar=a=>{papelera.push({item:inventario[a],pos:a}),inventario.splice(a,1),guardar()},window.restaurar=(a,e)=>{const t=papelera[a];"orig"===e?inventario.splice(Math.min(t.pos,inventario.length),0,t.item):inventario.push(t.item),papelera.splice(a,1),guardar()},document.getElementById("selectorTema").onchange=a=>document.body.setAttribute("data-tema",a.target.checked?"oscuro":"claro"),fetchTasas()</script></body></html>
