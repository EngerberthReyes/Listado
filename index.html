<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inventario</title><link rel="shortcut icon" href="Pergamino.png" type="image/png"><script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script><style>@font-face{font-family:"JetBrainsMono-ExtraLight";src:url(JetBrains\ Mono/JetBrainsMono-ExtraLight.ttf)}:root{--fondo:#0a0a0c;--tarjeta-bg:#161618;--texto:#ffffff;--acento:#00d1ff;--borde:#2d2d30;--peligro:#ffffff;--exito:#30d158;--euro:#ffffff;--bcv:#ffffff;--naranja:#ffffff;--rojo-prioridad:#ff453a;--naranja-prioridad:#ff9f0a}[data-tema=claro]{--fondo:#ffffff;--tarjeta-bg:#f2f2f7;--texto:#000000;--acento:#0070f3;--euro:#000000;--bcv:#000000;--peligro:#000000;--naranja:#000000;--borde:#d1d1d6}*,body{font-family:"JetBrainsMono-ExtraLight",Arial}*{box-sizing:border-box;transition:background-color .3s,color .3s,border-color .3s}body{background-color:var(--fondo);color:var(--texto);margin:0;padding:20px;display:flex;justify-content:center}.contenedor{width:100%;max-width:1400px}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}.panel-tasas{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px}.tasa-card{background:var(--tarjeta-bg);border:1px solid var(--borde);padding:15px;border-radius:12px;text-align:center}.tasa-label{font-size:.65rem;font-weight:800;color:var(--texto);text-transform:uppercase;display:block;margin-bottom:5px}.tasa-monto{font-size:1.2rem;font-weight:900}#in-precio::-webkit-inner-spin-button,#in-precio::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}#in-precio{appearance:textfield;-moz-appearance:textfield}.grupo-entrada{background:var(--tarjeta-bg);padding:20px;border-radius:16px;border:1px solid var(--borde);display:flex;flex-wrap:wrap;gap:15px;margin-bottom:30px;align-items:center}.grupo-entrada input,.grupo-entrada select{flex:1 1 180px;padding:12px;border-radius:8px;border:1px solid var(--borde);background:var(--fondo);color:var(--texto);outline:0}.btn,td,th{color:var(--texto)}.btn{padding:10px 18px;border-radius:8px;font-weight:700;cursor:pointer;border:1px solid var(--borde);background:var(--tarjeta-bg);text-transform:uppercase;font-size:.7rem;display:inline-flex;align-items:center;gap:5px}.btn:hover{background:var(--texto);color:var(--fondo)}.btn-add{background:var(--fondo)!important;color:var(--texto)!important;border-color:var(--texto)!important}.tarjeta-tabla{background:var(--tarjeta-bg);border-radius:12px;border:1px solid var(--borde);overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:900px}td,th{padding:15px}th{background:var(--borde);text-align:left;font-size:15px}td{border-bottom:1px solid var(--borde);font-size:.95rem}.drag-handle{cursor:grab;opacity:.3;padding-right:10px}.etiqueta,th{text-transform:uppercase}.etiqueta{padding:5px 12px;border-radius:6px;font-size:.65rem;font-weight:900;display:inline-block;background-color:var(--texto);color:var(--fondo);border:0;letter-spacing:.5px}.totales-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:30px}.total-card-v2{background:var(--tarjeta-bg);border:1px solid var(--borde);border-radius:12px;padding:20px;border-left:5px solid var(--borde)}.total-header{font-size:.7rem;font-weight:800;text-transform:uppercase;color:var(--texto);margin-bottom:10px}.total-row{display:flex;justify-content:space-between;align-items:baseline}.val-principal{font-size:1.6rem;font-weight:900}.val-bolivares{font-size:.95rem;font-weight:700}.switch{position:relative;display:inline-block;width:40px;height:20px}.switch input{opacity:0;width:0;height:0}.deslizador{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--borde);border-radius:20px}.deslizador:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background-color:var(--texto);border-radius:50%;transition:.3s}input:checked+.deslizador{background-color:#8827e2}input:checked+.deslizador:before{transform:translateX(20px);background-color:#000}</style></head><body data-tema="oscuro"><section class="contenedor"><header><h1>Inventario</h1><a style="text-decoration: none; color: var(--texto); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding-bottom: 2px; margin-left: 20px;" href="https://engerberthreyes.github.io/Listado/index desminificado.html">Ir a Inventario Con Items → </a><label class="switch"><input type="checkbox" id="selectorTema" checked="checked"><span class="deslizador"></span></label></header><section class="panel-tasas"><section class="tasa-card"><span class="tasa-label">Dólar BCV</span><span id="t-db" class="tasa-monto">---</span></section><section class="tasa-card"><span class="tasa-label">Euro BCV</span><span id="t-eb" class="tasa-monto">---</span></section><section class="tasa-card"><span class="tasa-label">Dólar Paralelo</span><span id="t-dp" class="tasa-monto">---</span></section><section class="tasa-card"><span class="tasa-label">Euro Paralelo</span><span id="t-ep" class="tasa-monto">---</span></section></section><section class="grupo-entrada"><input id="in-nombre" placeholder="Concepto / Producto"> <input type="number" id="in-precio" placeholder="Precio USD" step="0.01"> <select id="in-prioridad"><option value="Alta">Alta</option><option value="Media" selected="selected">Media</option><option value="Baja">Baja</option></select> <button class="btn btn-add" onclick="agregar()">Añadir Item</button></section><section class="tarjeta-tabla"><table><thead><tr><th width="40"></th><th>Producto</th><th>USD ($)</th><th>Bs. (BCV)</th><th>Bs. (Para)</th><th>Prioridad</th><th>Acción</th></tr></thead><tbody id="lista-inventario"></tbody></table></section><section class="totales-container" id="contenedor-totales"></section><footer id="seccion-papelera"><h3>Papelera de Reciclaje</h3><section class="tarjeta-tabla"><table><tbody id="lista-papelera"></tbody></table></section></footer></section><script>let tasas={db:0,eb:0,dp:0,ep:0};const datosIniciales=[];let inventario=JSON.parse(localStorage.getItem("inv_v5"));inventario&&0!==inventario.length||(inventario=datosIniciales);let papelera=JSON.parse(localStorage.getItem("pap_v5"))||[];const lista=document.getElementById("lista-inventario");async function fetchTasas(){try{const[t,e]=await Promise.all([fetch("https://ve.dolarapi.com/v1/dolares"),fetch("https://ve.dolarapi.com/v1/euros")]),a=await t.json(),n=await e.json();tasas.db=a.find(t=>"oficial"===t.fuente).promedio,tasas.dp=a.find(t=>"paralelo"===t.fuente).promedio,tasas.eb=n.find(t=>"oficial"===t.fuente).promedio,tasas.ep=n.find(t=>"paralelo"===t.fuente).promedio,render()}catch(t){console.error("Error APIs")}}Sortable.create(lista,{animation:150,handle:".drag-handle",ghostClass:"sortable-ghost",onEnd:()=>{inventario=Array.from(lista.querySelectorAll("tr")).map(t=>JSON.parse(t.dataset.info)),guardar()}});const f=t=>t.toLocaleString("es-VE",{minimumFractionDigits:2,maximumFractionDigits:2});function render(){document.getElementById("t-db").innerText=`Bs. ${tasas.db.toFixed(2)}`,document.getElementById("t-eb").innerText=`Bs. ${tasas.eb.toFixed(2)}`,document.getElementById("t-dp").innerText=`Bs. ${tasas.dp.toFixed(2)}`,document.getElementById("t-ep").innerText=`Bs. ${tasas.ep.toFixed(2)}`,lista.innerHTML="";let t=0;inventario.forEach((e,a)=>{const n=parseFloat(e.precio)||0;t+=n;const s=document.createElement("tr");s.dataset.info=JSON.stringify(e),s.innerHTML=`\n            <td><span class="drag-handle">⠿</span></td>\n            <td contenteditable="true" onblur="edit(${a},'nombre',this.innerText)">${e.nombre}</td>\n            <td style="font-weight:900">$<span contenteditable="true" onblur="edit(${a},'precio',this.innerText)">${e.precio}</span></td>\n            <td>${f(n*tasas.db)}</td>\n            <td>${f(n*tasas.dp)}</td>\n            <td><span class="etiqueta ${e.prioridad}">${e.prioridad}</span></td>\n            <td style="text-align:right"><button class="btn" style="padding:4px 8px" onclick="borrar(${a})">✕</button></td>\n          `,lista.appendChild(s)});const e=t*tasas.db,a=t*tasas.dp;document.getElementById("contenedor-totales").innerHTML=`\n          <section class="total-card-v2" style="border-left-color: var(--texto)">\n            <section class="total-header">Total Dólar BCV</section>\n            <section class="total-row"><span class="val-principal">$${f(t)}</span><span class="val-bolivares" style="color:var(--bcv)">Bs. ${f(e)}</span></section>\n          </section>\n          <section class="total-card-v2" style="border-left-color: var(--texto)">\n            <section class="total-header">Total Dólar Paralelo</section>\n            <section class="total-row"><span class="val-principal">$${f(t)}</span><span class="val-bolivares" style="color:var(--peligro)">Bs. ${f(a)}</span></section>\n          </section>\n          <section class="total-card-v2" style="border-left-color: var(--texto)">\n            <section class="total-header">Total Euro BCV</section>\n            <section class="total-row"><span class="val-principal">€${f(e/tasas.eb)}</span><span class="val-bolivares" style="color:var(--euro)">Bs. ${f(e)}</span></section>\n          </section>\n          <section class="total-card-v2" style="border-left-color: var(--texto)">\n            <section class="total-header">Total Euro Paralelo</section>\n            <section class="total-row"><span class="val-principal">€${f(a/tasas.ep)}</span><span class="val-bolivares" style="color:var(--naranja)">Bs. ${f(a)}</span></section>\n          </section>\n        `;const n=document.getElementById("lista-papelera");n.innerHTML="",document.getElementById("seccion-papelera").style.display=papelera.length?"block":"none",papelera.forEach((t,e)=>{n.innerHTML+=`<tr>\n            <td><s>${t.item.nombre}</s></td>\n            <td style="text-align:right; display:flex; gap:10px; justify-content:flex-end">\n              <button class="btn" style="font-size:11px" onclick="restaurar(${e},'orig')">Original</button>\n              <button class="btn" style="font-size:11px" onclick="restaurar(${e},'fin')">Al Final</button>\n            </td>\n          </tr>`})}function guardar(){localStorage.setItem("inv_v5",JSON.stringify(inventario)),localStorage.setItem("pap_v5",JSON.stringify(papelera)),render()}window.agregar=()=>{const t=document.getElementById("in-nombre"),e=document.getElementById("in-precio"),a=document.getElementById("in-prioridad");t.value&&(inventario.push({nombre:t.value,precio:e.value||0,prioridad:a.value}),t.value="",e.value="",guardar())},window.edit=(t,e,a)=>{inventario[t][e]=a,guardar()},window.borrar=t=>{papelera.push({item:inventario[t],pos:t}),inventario.splice(t,1),guardar()},window.restaurar=(t,e)=>{const a=papelera[t];"orig"===e?inventario.splice(Math.min(a.pos,inventario.length),0,a.item):inventario.push(a.item),papelera.splice(t,1),guardar()},document.getElementById("selectorTema").onchange=t=>document.body.setAttribute("data-tema",t.target.checked?"oscuro":"claro"),fetchTasas()</script></body></html>
