<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inventario</title><link rel="shortcut icon" href="Pergamino.png" type="image/png"><style>:root{--fondo:#0a0a0c;--tarjeta-bg:#161618;--texto:#ffffff;--acento:#00d1ff;--borde:#2d2d30;--peligro:#ff453a;--exito:#30d158;--aviso:#ff9f0a;--transicion-suave:0.4s ease-in-out}[data-tema=claro]{--fondo:#ffffff;--tarjeta-bg:#f4f4f7;--texto:#1a1a1a;--acento:#0070f3;--borde:#e1e1e6}*{box-sizing:border-box;transition:background-color var(--transicion-suave),color var(--transicion-suave)}body{background-color:var(--fondo);color:var(--texto);font-family:"Inter",system-ui,sans-serif;margin:0;display:flex;justify-content:center;padding:20px}.contenedor{width:100%;max-width:1000px}.encabezado{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:15px}.grupo-entrada{background:var(--tarjeta-bg);padding:20px;border-radius:15px;border:1px solid var(--borde);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:30px}.grupo-entrada input,.grupo-entrada select{flex:1 1 200px;padding:12px;border-radius:8px;border:1px solid var(--borde);background:var(--fondo);color:var(--texto);outline:0}.btn-agregar{flex:1 1 100%;background:var(--acento);color:#fff;border:0;padding:12px 25px;border-radius:8px;cursor:pointer;font-weight:700}@media (min-width:768px){.btn-agregar{flex:0 0 auto}}.tarjeta-tabla{background:var(--tarjeta-bg);border-radius:15px;border:1px solid var(--borde);overflow:hidden}table{width:100%;border-collapse:collapse}td,th{padding:15px}th{background:var(--borde);text-align:left;font-size:.75rem;text-transform:uppercase}td{border-bottom:1px solid var(--borde)}@media (max-width:700px){table,tbody,td,th,thead,tr{display:block}thead tr{position:absolute;top:-9999px;left:-9999px}tr{border-bottom:2px solid var(--borde);padding:10px 0}td{border:0;position:relative;padding-left:45%!important;text-align:right!important;min-height:40px}td:before{content:attr(data-label);position:absolute;left:15px;width:40%;text-align:left;font-weight:700;font-size:.7rem;color:var(--acento);text-transform:uppercase}.handle{display:none}td[data-label=Acción]{text-align:end!important;padding-left:15px!important}.flex-btns{justify-content:center;margin-top:10px}}.handle{cursor:grab;text-align:center;color:var(--acento);opacity:.6;width:40px}.flex-btns{display:flex;justify-content:flex-end;gap:4rem;flex-wrap:wrap}.btn-accion{padding:8px 12px;border-radius:6px;font-size:.8rem;background:0 0;cursor:pointer;border:1px solid var(--peligro);color:var(--peligro);font-weight:500}.btn-borrar:hover{background:var(--peligro);color:#fff}.btn-restaurar-orig{border-color:var(--exito);color:var(--exito)}.btn-restaurar-orig:hover{background:var(--exito);color:#fff}.btn-restaurar-fin{border-color:var(--acento);color:var(--acento)}.btn-restaurar-fin:hover{background:var(--acento);color:#fff}.etiqueta{padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:800}.Alta{background:rgba(255,69,58,.2);color:#ff453a}.Media{background:rgba(255,159,10,.2);color:#ff9f0a}.Baja{background:rgba(48,209,88,.2);color:#30d158}.switch{position:relative;display:inline-block;width:46px;height:24px}.switch input{opacity:0;width:0;height:0}.deslizador{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#444;border-radius:34px}.deslizador:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:#fff;border-radius:50%;transition:.3s}input:checked+.deslizador{background-color:var(--acento)}input:checked+.deslizador:before{transform:translateX(22px)}</style></head><body data-tema="oscuro"><section class="contenedor"><header class="encabezado"><h1>Inventario</h1><section><span>Claro</span> <label class="switch"><input type="checkbox" id="selectorTema" checked="checked"> <span class="deslizador"></span></label> <span>Oscuro</span></section></header><section class="grupo-entrada"><input class="input-nombre" placeholder="Producto..."> <input type="number" class="input-precio" placeholder="Precio $" min="0"> <select class="select-importancia"><option value="Alta">Alta</option><option value="Media">Media</option><option value="Baja">Baja</option></select> <button class="btn-agregar">Añadir</button></section><main class="tarjeta-tabla" id="tabla-principal"></main><footer class="seccion-papelera"><h3>Papelera</h3><section class="tarjeta-tabla" id="tabla-papelera"></section></footer></section><script>let inventario=JSON.parse(localStorage.getItem("inv_data"))?.inventario||[{nombre:"Cable",precio:"10",importancia:"Baja"},{nombre:"Mesa",precio:"150",importancia:"Alta"},{nombre:"Teclado y Mouse",precio:"60",importancia:"Media"},{nombre:"Saco cruzado negro",precio:"200",importancia:"Alta"},{nombre:"Hoddie",precio:"45",importancia:"Media"},{nombre:"Vans negras [No Botines]",precio:"80",importancia:"Media"}],papelera=JSON.parse(localStorage.getItem("inv_data"))?.papelera||[];const guardar=()=>localStorage.setItem("inv_data",JSON.stringify({inventario:inventario,papelera:papelera})),render=()=>{const e=document.getElementById("tabla-principal"),t=document.getElementById("tabla-papelera");if(0===inventario.length)e.innerHTML='<p style="padding:20px; text-align:center; opacity:0.5;">Inventario vacío</p>';else{let t='<table><thead><tr><th></th><th>Pos.</th><th>Producto</th><th>Precio</th><th>Prioridad</th><th style="text-align:end;">Acción</th><th></th></tr></thead><tbody>';inventario.forEach((e,a)=>{t+=`\n              <tr draggable="false" data-index="${a}">\n                <td class="handle">☰</td>\n                <td data-label="Posición" style="color:var(--acento); font-weight:bold">${a+1}°</td>\n                <td data-label="Producto" class="edit" data-field="nombre" contenteditable="true" data-index="${a}">${e.nombre}</td>\n                <td data-label="Precio">$<span class="edit" data-field="precio" contenteditable="true" data-index="${a}">${e.precio}</span> USD</td>\n                <td data-label="Prioridad"><span class="etiqueta ${e.importancia}">${e.importancia}</span></td>\n                <td data-label="Acción" style="text-align:end;"><button class="btn-accion btn-borrar" onclick="borrar(${a})">Borrar</button></td>\n                <td class="handle">⠿</td>\n              </tr>`}),e.innerHTML=t+"</tbody></table>",vincularDrag()}document.querySelector(".seccion-papelera").style.display=papelera.length?"block":"none";let a="<table><tbody>";papelera.forEach((e,t)=>{a+=`\n            <tr>\n              <td data-label="Objeto"><s>${e.objeto.nombre}</s> <small>(Original: ${e.pos+1}°)</small></td>\n              <td data-label="Acción">\n                <div class="flex-btns">\n                  <button class="btn-accion btn-restaurar-orig" onclick="restaurar(${t}, 'original')">En su posición</button>\n                  <button class="btn-accion btn-restaurar-fin" onclick="restaurar(${t}, 'final')">Al final</button>\n                </div>\n              </td>\n            </tr>`}),t.innerHTML=a+"</tbody></table>",guardar()};function vincularDrag(){document.querySelectorAll("tr[data-index]").forEach(e=>{e.querySelectorAll(".handle").forEach(t=>{t.onmousedown=()=>e.draggable=!0}),e.onmouseup=()=>e.draggable=!1,e.ondragstart=t=>{t.dataTransfer.setData("idx",e.dataset.index),e.style.opacity="0.4"},e.ondragover=e=>e.preventDefault(),e.ondrop=t=>{const a=t.dataTransfer.getData("idx"),n=e.dataset.index,r=inventario.splice(a,1)[0];inventario.splice(n,0,r),render()},e.ondragend=()=>render()})}window.borrar=e=>{papelera.push({objeto:inventario[e],pos:e}),inventario.splice(e,1),render()},window.restaurar=(e,t)=>{const a=papelera[e];"original"===t?inventario.splice(Math.min(a.pos,inventario.length),0,a.objeto):inventario.push(a.objeto),papelera.splice(e,1),render()},document.querySelector(".btn-agregar").addEventListener("click",()=>{const e=document.querySelector(".input-nombre"),t=document.querySelector(".input-precio"),a=document.querySelector(".select-importancia");e.value.trim()&&(inventario.push({nombre:e.value,precio:t.value||"0",importancia:a.value}),e.value="",t.value="",render())}),document.getElementById("tabla-principal").addEventListener("focusout",e=>{if(e.target.classList.contains("edit")){const t=e.target.dataset.index,a=e.target.dataset.field;inventario[t][a]=e.target.innerText,guardar()}}),document.getElementById("selectorTema").addEventListener("change",e=>{document.body.setAttribute("data-tema",e.target.checked?"oscuro":"claro")}),render()</script></body></html>
